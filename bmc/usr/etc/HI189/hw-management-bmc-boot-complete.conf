#
# Minimum top-level entry counts under /var/run/hw-management/ before
# hw-management-bmc-boot-complete.service is considered ready (actual counts may be higher).
# Installed to /etc/hw-management-bmc-boot-complete.conf by hw-management-bmc-plat-specific-preps.
#
# All three thresholds must pass. Journal lines look like:
#   waiting system=A/B thermal=C/D eeprom=E/F
# If eeprom and thermal already meet (E>=F, C>=D) but the service still waits, the
# blocker is system (A < B): either raise sysfs coverage (udev / drivers) or lower
# SYSFS_SYSTEM_COUNTER to a value your platform reliably reaches (see README).
SYSFS_SYSTEM_COUNTER=157
SYSFS_EEPROM_COUNTER=2
SYSFS_THERMAL_COUNTER=4
# Optional: BOOT_COMPLETE_MAX_WAIT_SEC=1800  (unset uses 1800; 0 = wait indefinitely)
# Optional: BOOT_COMPLETE_POLL_SEC=2
