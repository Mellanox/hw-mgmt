CPLD_I2C_BUS=14

# Host power-on / restore policy after BMC init (check_power_restore_policy in
# hw-management-bmc-helpers.sh). OpenBMC-style names: AlwaysOff | AlwaysOn | Restore.
# If unset or invalid, policy falls back to legacy default (* → return 3).
POWER_ON_POLICY=AlwaysOff

# Delay in whole seconds; 0 = none. Exported to get_power_restore_delay as
# microseconds for hw-management-bmc-events.sh (usleep). With AlwaysOn, non-zero
# delay yields policy 0 (do not auto-start host CPU from policy path until delay logic applies).
POWER_POLICY_DELAY=0

# Management Ethernet interfaces present on this BMC (used by bmc_init_eth() in
# hw-management-bmc-helpers-common.sh). 2 = eth0 + eth1 (default). Set to 1
# when there is no eth1 (single management NIC); eth0 DHCP recovery still runs.
MGMT_IF_NUM=1